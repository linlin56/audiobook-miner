name: Actions

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: make install

      - name: Upload venv
        uses: actions/upload-artifact@v4
        with:
          name: venv
          path: .venv/
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download venv
        uses: actions/download-artifact@v4
        with:
          name: venv
          path: .venv/

      - name: Restore venv permissions
        run: chmod -R u+x .venv/bin/

      - name: Run tests
        run: make test
